<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Start record</title>
<style type="text/css">
</style>

<script type="text/javascript">
	function onload(){
		document.getElementById("record").click();
		setTimeout(function(){ window.close() }, 3500);
	}
</script>

</head>
<body onload="onload()">
	<div style="position:fixed; bottom:-25px;right:5px;">
		<div class="start-screen-recording" id="record"><div><div class="rec-dot"></div><span>开始录制</span></div></div>
	</div>
<script src="https://api.apowersoft.cn/screen-recorder?lang=zh" defer></script>
</body>
</html>
